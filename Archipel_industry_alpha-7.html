/* ════════════════════════════════════════════════════════════════
   THÈME — palette imposée par le brief (#0d0d1a) + langage visuel
   cohérent avec les autres jeux du projet (Bebas / Barlow / DM Mono)
   ════════════════════════════════════════════════════════════════ */
:root{
  --bg:#0d0d1a; --panel:#15152a; --panel-2:#1c1c36; --line:#2a2a4a;
  --ink:#d4dce8; --ink-dim:#7a7a9a; --ink-faint:#5a5a7a;
  --yellow:#f0d060; --green:#30D158; --red:#FF3B30; --orange:#FF9500;
  --t-infra:#9aa3b2; --t0:#7ecf7e; --t1:#7ec8e3;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
/* Pixel bitmap font is wider/blockier than the proportional fonts it replaced, so the
   whole rem-based UI grew. Shrink the root rem and drop the now-redundant letter-spacing
   (the 8x8 glyphs already include their own spacing) to bring the UI back to size. */
html{font-size:12.5px;}
html *{letter-spacing:0 !important;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
  font-family:'Barlow Condensed',sans-serif;touch-action:none;}
#root{height:100%;}

/* ── Layout principal : HUD / scène / barre d'outils ── */
.app{height:100%;display:flex;flex-direction:column;}

/* ── HUD ── */
.hud{display:flex;align-items:center;gap:10px;padding:6px 12px;background:var(--panel);
  border-bottom:1px solid var(--line);flex-shrink:0;min-height:46px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
.hud::-webkit-scrollbar{height:5px;}
.hud::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.hud-brand{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.06em;
  color:var(--ink);line-height:1;white-space:nowrap;}
.hud-brand b{color:var(--yellow);}
.island-select{position:relative;flex-shrink:0;}
.island-chip{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.08em;
  background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  padding:3px 9px;border-radius:3px;white-space:nowrap;cursor:pointer;
  display:flex;align-items:center;gap:6px;line-height:1;transition:background .1s,border-color .1s;}
.island-chip:hover{background:#23234a;border-color:#3a3a6a;}
.island-chip.open{border-color:var(--yellow);}
.island-chip .caret{font-size:.66em;opacity:.7;}
.island-backdrop{position:fixed;inset:0;z-index:121;}
.island-menu{position:fixed;z-index:122;min-width:118px;
  background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:4px;
  display:flex;flex-direction:column;gap:2px;box-shadow:0 8px 26px rgba(0,0,0,.55);}
.island-menu-item{font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:.06em;
  color:var(--ink);background:none;border:none;text-align:left;padding:7px 10px;border-radius:4px;
  cursor:pointer;line-height:1;}
.island-menu-item:hover{background:#2a2a4a;}
.island-menu-item.active{background:#26264e;color:var(--yellow);}
.island-menu-item.locked{opacity:.4;cursor:not-allowed;}
.island-menu-item .lock{font-size:.7rem;margin-left:2px;}
.stocks{flex:1;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;}
.stocks::-webkit-scrollbar{display:none;}
.stock{display:flex;align-items:baseline;gap:4px;background:var(--panel-2);
  border:1px solid var(--line);border-radius:3px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.stock .k{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.04em;
  color:var(--ink-dim);text-transform:uppercase;}
.stock .v{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--ink);}
.stock.energy.ok .v{color:var(--green);}
.stock.energy.deficit .v{color:var(--red);}
.stock.energy.deficit{border-color:rgba(255,59,48,.5);}
/* Bouton mode dev */
.dev-btn{flex-shrink:0;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);
  border-radius:4px;padding:4px 10px;cursor:pointer;font-family:'Bebas Neue',sans-serif;
  font-size:.82rem;letter-spacing:.08em;transition:background .1s,border-color .1s,color .1s;}
.dev-btn:hover{border-color:#3a3a6a;color:var(--ink);}
.dev-btn:active{transform:translateY(1px);}
.dev-btn.on{background:rgba(255,59,48,.18);border-color:var(--red);color:#ff7a72;}
/* Inventaire complet de l'île (sous la barre HUD) */
.inventory{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:4px 12px;
  background:var(--panel-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
.inventory::-webkit-scrollbar{height:5px;}
.inventory::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.inventory.collapsed{padding:3px 12px;}
.inv-label-btn{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:.1em;
  color:var(--ink-dim);background:var(--panel);border:1px solid var(--line);border-radius:4px;
  padding:3px 12px;cursor:pointer;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.inv-label-btn:hover{border-color:var(--yellow);color:var(--ink);}
.inv-label-btn.open{color:var(--yellow);border-color:rgba(255,209,102,.4);position:sticky;left:0;}
.inv-count{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--ink-faint);
  background:var(--panel-2);border-radius:8px;padding:0 6px;}
.inv-empty{font-family:'Barlow Condensed',sans-serif;font-size:.74rem;color:var(--ink-faint);}
.inv-item{display:flex;align-items:baseline;gap:4px;white-space:nowrap;flex-shrink:0;
  padding:1px 6px;border-radius:3px;background:var(--panel);border:1px solid var(--line);}
.inv-item .ik{font-family:'Barlow Condensed',sans-serif;font-size:.66rem;color:var(--ink-dim);
  text-transform:capitalize;}
.inv-item .iv{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--ink);
  min-width:3.2em;text-align:right;}
.inv-item.clickable{cursor:pointer;}
.inv-item.clickable:hover{border-color:var(--yellow);}
.inv-ico{width:14px;height:14px;image-rendering:pixelated;flex-shrink:0;vertical-align:middle;}
.ui-ico{width:16px;height:16px;image-rendering:pixelated;flex-shrink:0;vertical-align:middle;display:inline-block;}
.tab-ico .ui-ico,.tab-ico.ui-ico{width:18px;height:18px;}
.inventory.open{flex-wrap:wrap;max-height:140px;overflow-y:auto;align-items:center;}
.inv-tier-sep{font-family:'Bebas Neue',sans-serif;font-size:.62rem;letter-spacing:.12em;
  color:var(--yellow);background:rgba(255,209,102,.10);border:1px solid rgba(255,209,102,.28);
  border-radius:3px;padding:1px 6px;flex-shrink:0;align-self:center;}
.res-pop{position:fixed;z-index:130;background:var(--panel);border:1px solid #33335e;border-radius:8px;
  box-shadow:0 12px 36px rgba(0,0,0,.55);padding:9px 12px;min-width:170px;}
.res-pop-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.05em;color:var(--ink);
  text-transform:capitalize;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.res-pop-close{background:none;border:none;color:var(--ink-dim);font-size:1.1rem;line-height:1;cursor:pointer;padding:0 2px;}
.res-pop-close:hover{color:var(--ink);}
.res-pop-row{display:flex;justify-content:space-between;gap:14px;font-family:'DM Mono',monospace;font-size:.74rem;padding:2px 0;}
.res-pop-row .rl{color:var(--ink-dim);}
.res-pop-row.prod .rv{color:#5fd08a;}
.res-pop-row.conso .rv{color:#ff7a72;}
.res-pop-row.net{border-top:1px solid var(--line);margin-top:3px;padding-top:4px;}
.res-pop-row.net .rv.pos{color:#5fd08a;}
.res-pop-row.net .rv.neg{color:#ff7a72;}
/* Bandeau MODE DEV en haut du canvas */
.dev-banner{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:40;
  background:rgba(255,59,48,.9);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:.9rem;
  letter-spacing:.08em;padding:4px 16px;border-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.4);
  pointer-events:none;}
.sat-banner{position:absolute;top:8px;right:8px;z-index:40;
  background:rgba(255,149,0,.92);color:#1a1208;font-family:'Bebas Neue',sans-serif;font-size:.82rem;
  letter-spacing:.05em;padding:4px 12px;border-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.4);
  pointer-events:none;max-width:60%;}
.save-btn{display:flex;align-items:center;gap:5px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:4px 9px;
  cursor:pointer;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;
  letter-spacing:.03em;transition:background .1s,border-color .1s;}
.save-btn:hover{background:#23234a;border-color:#3a3a6a;}
.save-btn:active{transform:translateY(1px);}
.save-btn .ago{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--ink-dim);}
.research-btn{display:flex;align-items:center;gap:5px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:4px 9px;
  cursor:pointer;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;
  letter-spacing:.03em;transition:background .1s,border-color .1s;}
.research-btn:hover{background:#23234a;border-color:var(--yellow);}
.research-btn:active{transform:translateY(1px);}
.research-btn .rlabel{text-transform:uppercase;letter-spacing:.05em;}
/* Bouton Réparer (déblocage île suivante) */
.repair-btn{display:flex;flex-direction:column;align-items:flex-start;gap:0;background:rgba(76,175,80,.14);
  border:1px solid #4CAF50;color:#7fd98a;border-radius:4px;padding:3px 10px;cursor:pointer;flex-shrink:0;
  font-family:'Barlow Condensed',sans-serif;transition:background .1s;line-height:1.15;}
.repair-btn:hover{background:rgba(76,175,80,.24);}
.repair-btn:active{transform:translateY(1px);}
.repair-btn:disabled{background:#2a2a3e;border-color:var(--line);color:var(--ink-faint);cursor:not-allowed;}
.repair-btn .rep-txt{font-size:.74rem;text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
.repair-btn .rep-cost{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--ink-dim);}

/* ── Panneau Port ── */
.port-panel{width:min(540px,95vw);}
.pp-section-label{font-family:'Bebas Neue',sans-serif;font-size:.92rem;letter-spacing:.06em;
  color:var(--ink-dim);margin:4px 0 2px;padding-top:4px;border-top:1px solid var(--line);}
.pp-section-label:first-child{border-top:none;padding-top:0;}
.pp-port-up{display:flex;flex-direction:column;gap:5px;padding:4px 0 6px;}
.pp-port-row{display:flex;justify-content:space-between;align-items:baseline;}
.pp-port-lvl{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.86rem;color:var(--ink);}
.pp-port-next{font-family:'DM Mono',monospace;font-size:.7rem;color:#7fd98a;}
.pp-port-cost{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.pp-empty,.pp-note{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:var(--ink-faint);padding:3px 0;}
.pp-note{margin-top:6px;line-height:1.35;}
.pp-link{border:1px solid var(--line);border-radius:6px;padding:6px 9px;background:var(--panel-2);margin-bottom:5px;}
.pp-link-top{display:flex;justify-content:space-between;align-items:baseline;}
.pp-link-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.86rem;color:var(--ink);}
.pp-link-state{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--ink-dim);}
.pp-cargo{display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:3px;}
.pp-cargo-item{font-family:'DM Mono',monospace;font-size:.66rem;color:#8fd0ff;}
.pp-cargo-empty{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--ink-faint);}
.pp-cfg-head,.pp-cfg-row{display:grid;grid-template-columns:1fr 62px 62px 34px 44px;gap:6px;align-items:center;}
.pp-cfg-head{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;
  color:var(--ink-faint);padding:2px 0;}
.pp-cfg-head .pp-c-num,.pp-cfg-head .pp-c-tog,.pp-cfg-head .pp-c-pri{text-align:center;}
.pp-cfg-row{padding:3px 0;border-top:1px solid rgba(255,255,255,.04);}
.pp-cfg-row.off{opacity:.5;}
.pp-c-res{display:flex;flex-direction:column;line-height:1.1;}
.pp-res-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.8rem;color:var(--ink);text-transform:capitalize;}
.pp-res-stock{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--ink-faint);}
input.pp-c-num{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:4px;
  color:var(--ink);font-family:'DM Mono',monospace;font-size:.7rem;padding:3px 4px;text-align:right;}
input.pp-c-num:focus{outline:none;border-color:var(--yellow);}
button.pp-c-tog{background:var(--panel);border:1px solid var(--line);border-radius:4px;color:var(--ink-dim);
  font-size:.8rem;cursor:pointer;padding:2px 0;line-height:1;}
button.pp-c-tog.active{border-color:var(--red);color:#ff7a72;background:rgba(255,59,48,.12);}
.pp-c-pri{display:flex;gap:2px;justify-content:center;}
.pp-c-pri button{background:var(--panel);border:1px solid var(--line);border-radius:3px;color:var(--ink-dim);
  font-size:.6rem;cursor:pointer;padding:1px 3px;line-height:1;}
.pp-c-pri button:disabled{opacity:.3;cursor:not-allowed;}
.pp-c-pri button:not(:disabled):hover{border-color:var(--yellow);color:var(--ink);}
.ep-modes{display:flex;gap:6px;margin:4px 0 6px;}
.ep-mode-btn{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;color:var(--ink-dim);
  font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;padding:6px 4px;}
.ep-mode-btn:hover{border-color:var(--yellow);color:var(--ink);}
.ep-mode-btn.on{border-color:var(--yellow);color:#0c0c14;background:var(--yellow);}
.ep-row{display:grid;grid-template-columns:22px 1fr auto auto 44px;gap:7px;align-items:center;
  padding:4px 0;border-top:1px solid rgba(255,255,255,.04);}
.ep-rank{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--ink-faint);text-align:center;}
.ep-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.82rem;color:var(--ink);}
.ep-pos{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--ink-faint);}
.ep-pow{font-family:'DM Mono',monospace;font-size:.68rem;color:#8fd0ff;text-align:right;}
.stock.energy{cursor:pointer;}

/* ── Panneau Recherche (overlay) ── */
.research-backdrop{position:fixed;inset:0;z-index:120;background:rgba(5,5,15,.55);}
.research-panel{position:fixed;z-index:121;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(560px,94vw);max-height:84vh;display:flex;flex-direction:column;
  background:var(--panel);border:1px solid #33335e;border-radius:10px;
  box-shadow:0 18px 60px rgba(0,0,0,.6);overflow:hidden;}
.rd-popup{position:fixed;z-index:131;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(380px,92vw);background:var(--panel);border:1px solid var(--yellow);border-radius:12px;
  box-shadow:0 18px 60px rgba(0,0,0,.65);padding:20px 22px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:7px;}
.rd-icon{font-size:2.2rem;line-height:1;}
.rd-icon .ui-ico.rd-spr,.ui-ico.rd-spr{width:40px;height:40px;}
.rd-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.08em;color:var(--yellow);}
.rd-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.05rem;color:var(--ink);}
.rd-unlocks{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;color:var(--ink-dim);line-height:1.3;}
.rd-actions{display:flex;gap:8px;margin-top:8px;}
.rd-btn{background:var(--yellow);color:#1a1a10;border:none;border-radius:6px;padding:7px 18px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.86rem;cursor:pointer;}
.rd-btn-sec{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:6px;
  padding:7px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.82rem;cursor:pointer;}
.rd-btn-sec:hover{border-color:var(--yellow);}
.rp-head{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);}
.rp-title{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.06em;color:var(--ink);}
.rp-close{margin-left:auto;background:none;border:none;color:var(--ink-dim);font-size:1.3rem;
  line-height:1;cursor:pointer;padding:0 4px;}
.rp-close:hover{color:var(--ink);}
.rp-list{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;}
.rp-node{border:1px solid var(--line);border-radius:7px;padding:8px 10px;background:var(--panel-2);}
.rp-node.st-confirmed{opacity:.5;}
.rp-node.st-ready{border-color:var(--yellow);background:#23231c;}
.rp-node.st-locked{opacity:.4;}
.rp-node-top{display:flex;align-items:center;gap:7px;}
.rp-badge{font-size:.85rem;width:16px;text-align:center;flex-shrink:0;}
.rp-name{font-family:'Barlow Condensed',sans-serif;font-size:.92rem;letter-spacing:.02em;color:var(--ink);}
.rp-st{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:.64rem;text-transform:uppercase;
  letter-spacing:.05em;color:var(--ink-dim);flex-shrink:0;}
.st-ready .rp-st{color:var(--yellow);}
.st-confirmed .rp-badge{color:var(--green);}
.rp-reqs{margin-top:6px;display:flex;flex-direction:column;gap:3px;}
.rp-req{display:flex;align-items:baseline;gap:8px;font-family:'DM Mono',monospace;font-size:.68rem;}
.rp-req .rq-l{color:var(--ink-dim);text-transform:capitalize;}
.rp-req .rq-v{margin-left:auto;color:var(--ink);}
.rp-req.ok .rq-v{color:var(--green);}
.rp-deliver{margin-top:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.rp-cost{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.rp-ci{font-family:'DM Mono',monospace;font-size:.66rem;padding:1px 6px;border-radius:3px;
  border:1px solid var(--line);white-space:nowrap;}
.rp-ci.ok{color:var(--green);border-color:rgba(48,209,88,.4);}
.rp-ci.miss{color:var(--red);border-color:rgba(255,59,48,.35);}
.rp-ready-note{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:var(--green);flex:1;}
.rp-btn{background:var(--yellow);color:#1a1a10;border:none;border-radius:5px;padding:5px 14px;
  font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:.05em;cursor:pointer;flex-shrink:0;}
.rp-btn:hover{filter:brightness(1.08);}
.rp-btn:disabled{background:#3a3a5a;color:var(--ink-dim);cursor:not-allowed;filter:none;}
.rp-unlocks{margin-top:5px;font-family:'Barlow Condensed',sans-serif;font-size:.68rem;
  color:var(--ink-dim);line-height:1.3;}
.rp-lockhint{margin-top:5px;font-family:'Barlow Condensed',sans-serif;font-size:.66rem;color:var(--ink-dim);}

/* ── Panneau Emplacements de sauvegarde (overlay) ── */
.slot-backdrop{position:fixed;inset:0;z-index:120;background:rgba(5,5,15,.55);}
.slot-panel{position:fixed;z-index:121;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(480px,94vw);max-height:84vh;display:flex;flex-direction:column;
  background:var(--panel);border:1px solid #33335e;border-radius:10px;
  box-shadow:0 18px 60px rgba(0,0,0,.6);overflow:hidden;}
.slot-head{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);}
.slot-title{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.06em;color:var(--ink);}
.slot-close{margin-left:auto;background:none;border:none;color:var(--ink-dim);font-size:1.3rem;
  line-height:1;cursor:pointer;padding:0 4px;}
.slot-close:hover{color:var(--ink);}
.slot-list{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;}
.slot-row{border:1px solid var(--line);border-radius:7px;padding:9px 11px;background:var(--panel-2);
  display:flex;flex-direction:column;gap:7px;}
.slot-row.active{border-color:var(--yellow);background:#23231c;}
.slot-row-top{display:flex;align-items:center;gap:8px;}
.slot-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.96rem;color:var(--ink);
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slot-badge{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;text-transform:uppercase;
  letter-spacing:.06em;color:#1a1a10;background:var(--yellow);border-radius:4px;padding:1px 7px;flex-shrink:0;}
.slot-date{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--ink-dim);flex-shrink:0;}
.slot-name-input{flex:1;min-width:0;background:var(--panel);border:1px solid var(--yellow);border-radius:4px;
  color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-size:.96rem;padding:3px 7px;}
.slot-actions{display:flex;gap:6px;flex-wrap:wrap;}
.slot-btn{background:var(--panel);border:1px solid var(--line);border-radius:5px;color:var(--ink);
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.74rem;letter-spacing:.02em;
  padding:5px 11px;cursor:pointer;transition:border-color .1s,background .1s;}
.slot-btn:hover{border-color:#3a3a6a;background:#23234a;}
.slot-btn.primary{border-color:var(--yellow);color:var(--yellow);}
.slot-btn.primary:hover{background:#26264e;}
.slot-btn.danger{border-color:rgba(255,59,48,.5);color:#ff8079;}
.slot-btn.danger:hover{background:rgba(255,59,48,.16);}
.slot-btn:disabled{opacity:.4;cursor:not-allowed;}
.slot-foot{display:flex;gap:8px;padding:11px 14px;border-top:1px solid var(--line);}
.slot-new{flex:1;background:var(--panel-2);border:1px dashed #3a3a6a;border-radius:6px;color:var(--ink);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.84rem;letter-spacing:.03em;
  padding:8px;cursor:pointer;}
.slot-new:hover{border-color:var(--yellow);color:var(--yellow);}
.slot-confirm{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:#ff8079;align-self:center;}
/* ── Panneau Options ── */
.options-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--panel-2);
  border:1px solid var(--line);border-radius:6px;color:var(--ink-dim);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.03em;
  padding:5px 11px;}
.options-btn:hover{border-color:#3a3a6a;color:var(--ink);}
.options-btn .gear{font-size:1rem;line-height:1;}
.opt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;
  border:1px solid var(--line);border-radius:7px;padding:11px 12px;background:var(--panel-2);}
.opt-lbl{display:flex;flex-direction:column;gap:2px;min-width:0;}
.opt-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.95rem;color:var(--ink);}
.opt-desc{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--ink-dim);}
.opt-toggle{flex-shrink:0;width:46px;height:25px;border-radius:13px;border:1px solid var(--line);
  background:var(--panel);position:relative;cursor:pointer;transition:background .12s,border-color .12s;}
.opt-toggle::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;
  background:var(--ink-dim);transition:transform .12s,background .12s;}
.opt-toggle.on{background:rgba(76,175,80,.25);border-color:#4CAF50;}
.opt-toggle.on::after{transform:translateX(21px);background:#7fd98a;}
.opt-toggle.dev.on{background:rgba(255,59,48,.22);border-color:var(--red);}
.opt-toggle.dev.on::after{background:#ff8079;}
.opt-fullbtn{width:100%;}

/* ── Scène (canvas + overlays) ── */
.stage{position:relative;flex:1;min-height:0;overflow:hidden;background:var(--bg);}
canvas{position:absolute;inset:0;display:block;touch-action:none;cursor:crosshair;}
.stage.sel canvas{cursor:grab;}
.stage.sel.dragging canvas{cursor:grabbing;}

/* ── Bandeau d'état (hint selon l'outil) ── */
.status{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
  background:rgba(13,13,26,.82);border:1px solid var(--line);border-radius:4px;
  padding:3px 12px;font-size:.74rem;letter-spacing:.02em;color:var(--ink-dim);
  pointer-events:none;white-space:nowrap;backdrop-filter:blur(4px);max-width:92%;
  overflow:hidden;text-overflow:ellipsis;}
.status b{color:var(--yellow);}

/* ── Toast ── */
.toast{position:absolute;left:50%;top:12px;transform:translateX(-50%) scale(.9);
  background:rgba(13,13,26,.94);border:1px solid var(--line);border-radius:5px;
  padding:7px 16px;font-size:.92rem;font-weight:600;letter-spacing:.01em;color:var(--ink);
  pointer-events:none;opacity:0;z-index:60;white-space:nowrap;backdrop-filter:blur(6px);
  transition:opacity .14s,transform .14s;}
.toast.show{opacity:1;transform:translateX(-50%) scale(1);}

/* ── Panneau d'info bâtiment ── */
.info-panel{position:absolute;z-index:50;width:230px;background:var(--panel);
  border:1px solid var(--line);border-radius:8px;padding:13px 14px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);transition:opacity .08s;}
.ip-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ip-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,.15);}
.ip-name{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.04em;
  color:var(--ink);line-height:1;flex:1;}
.ip-level{font-family:'DM Mono',monospace;font-size:.66rem;color:#0d0d1a;background:rgba(76,175,80,.95);
  border-radius:3px;padding:1px 5px;flex-shrink:0;}
.ip-actions{display:flex;gap:6px;margin-bottom:8px;}
.ip-nuc-sel{margin:6px 0 2px;padding-top:6px;border-top:1px solid var(--line);}
.ip-nuc-sel-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.74rem;color:var(--ink-dim);display:block;margin-bottom:4px;}
.ip-nuc-mats{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.ip-nuc-mat{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:5px;padding:5px 6px;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;}
.ip-nuc-mat.on{background:#7E57C2;color:#fff;border-color:#7E57C2;}
.ip-nuc-mat:hover{border-color:#7E57C2;}
.ip-up,.ip-down{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;border-radius:5px;
  padding:6px 4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;transition:background .1s,opacity .1s;}
.ip-up{background:rgba(76,175,80,.14);border:1px solid rgba(76,175,80,.5);color:#86d98a;}
.ip-up:hover:not(:disabled){background:rgba(76,175,80,.24);}
.ip-down{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--ink-dim);}
.ip-down:hover:not(:disabled){background:rgba(255,255,255,.1);}
.ip-up:disabled,.ip-down:disabled{opacity:.4;cursor:not-allowed;}
.ip-up .ip-sub,.ip-down .ip-sub{font-family:'DM Mono',monospace;font-size:.62rem;font-weight:400;opacity:.85;}
.ip-up:active:not(:disabled),.ip-down:active:not(:disabled){transform:translateY(1px);}
.ip-up.armed{background:rgba(76,175,80,.3);border-color:#4CAF50;color:#9ee29f;
  box-shadow:0 0 0 1px #4CAF50 inset;}
/* Aperçu d'amélioration (affiché après le 1er clic sur « Monter ») */
.ip-up-preview{margin-bottom:9px;padding:8px 0 2px;border-top:1px solid var(--line);}
.ip-up-ptitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;
  text-transform:uppercase;letter-spacing:.04em;color:#7fd98a;margin-bottom:6px;}
.ip-up-preview .up-rows{margin-bottom:6px;}
.ip-close{background:none;border:none;color:var(--ink-faint);font-size:1.1rem;cursor:pointer;
  line-height:1;padding:0 2px;}
.ip-close:hover{color:var(--ink);}
.ip-rows{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
.ip-row{display:flex;justify-content:space-between;gap:10px;font-size:.76rem;}
.ip-row .lbl{color:var(--ink-dim);text-transform:uppercase;letter-spacing:.04em;font-size:.64rem;
  padding-top:1px;}
.ip-row .val{font-family:'DM Mono',monospace;font-size:.74rem;color:var(--ink);text-align:right;}
.ip-row .val.io{color:var(--t0);}
.ip-row.capped .lbl{color:var(--orange);}
.ip-row.capped .val{color:var(--orange);}
.ip-demolish{width:100%;background:rgba(255,59,48,.12);border:1px solid rgba(255,59,48,.5);
  color:#ff7a72;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;
  letter-spacing:.06em;text-transform:uppercase;border-radius:5px;padding:8px;cursor:pointer;
  transition:background .1s;}
.ip-demolish:hover{background:rgba(255,59,48,.22);}
.ip-demolish:active{transform:translateY(1px);}

/* ── Barre d'outils ── */
.toolbar{flex-shrink:0;background:var(--panel);border-top:1px solid var(--line);
  display:flex;align-items:stretch;gap:0;overflow-x:auto;scrollbar-width:thin;
  scrollbar-color:var(--line) transparent;}
.toolbar-wrap{flex-shrink:0;display:flex;flex-direction:column;}
.build-panel{display:flex;align-items:stretch;gap:0;overflow-x:auto;background:var(--panel-2);
  border-top:1px solid var(--line);scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  max-height:148px;animation:buildrise .16s ease-out;}
.build-panel::-webkit-scrollbar{height:6px;}
.build-panel::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
@keyframes buildrise{from{max-height:0;opacity:.3;}to{max-height:148px;opacity:1;}}
.tool-group.tabs{margin-left:auto;border-right:none;border-left:1px solid var(--line);}
.tab-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:96px;
  background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:6px 10px;
  cursor:pointer;text-align:left;transition:border-color .1s,background .1s;flex-shrink:0;}
.tab-btn:hover{background:#23234a;}
.tab-btn .tb-top{display:flex;align-items:center;gap:6px;}
.tab-btn .tab-ico{font-size:1rem;line-height:1;}
.tab-btn .tb-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.86rem;
  color:var(--ink);white-space:nowrap;}
.tab-btn .tb-sub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--ink-dim);white-space:nowrap;}
.tab-btn.active{border-color:var(--yellow);background:#26264e;box-shadow:0 0 0 1px var(--yellow) inset;}
.tab-btn.active .tb-name{color:var(--yellow);}
.tab-btn.has-sel{border-color:var(--green);}
.tab-btn.has-sel .tb-sub{color:#7fd98a;}
/* Barre d'onglets du bas : 5 onglets répartis sur toute la largeur, jamais coupés. */
.tool-group.tabs{flex:1 1 auto;margin-left:0;border-left:none;}
.tool-group.tabs .tool-group-inner{width:100%;}
.tabs-row{display:flex;flex-wrap:nowrap;gap:4px;width:100%;}
.tabs-row .tab-btn{flex:1 1 0;min-width:0;align-items:center;text-align:center;padding:6px 4px;}
.tabs-row .tab-btn .tb-top{justify-content:center;gap:4px;}
.tabs-row .tab-btn .tb-name,.tabs-row .tab-btn .tb-sub{max-width:100%;overflow:hidden;text-overflow:ellipsis;}
.tab-btn.tab-dem.active{border-color:var(--red);background:rgba(255,59,48,.16);box-shadow:0 0 0 1px var(--red) inset;}
.tab-btn.tab-dem.active .tb-name{color:#ff7a72;}
.tab-btn.tab-upg.active{border-color:#4CAF50;background:rgba(76,175,80,.16);box-shadow:0 0 0 1px #4CAF50 inset;}
.tab-btn.tab-upg.active .tb-name{color:#7fd98a;}
.toolbar::-webkit-scrollbar{height:6px;}
.toolbar::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.tool-group{display:flex;align-items:stretch;gap:6px;padding:8px 10px;flex-shrink:0;
  border-right:1px solid var(--line);}
.tool-group-inner{display:flex;flex-direction:column;gap:5px;}
.tool-group-label{font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-faint);padding-left:2px;}
.tool-row{display:flex;gap:5px;}
.tool-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:76px;
  background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:6px 8px;
  cursor:pointer;text-align:left;transition:border-color .1s,background .1s;flex-shrink:0;}
.tool-btn:hover{background:#23234a;}
.tool-btn .tb-top{display:flex;align-items:center;gap:6px;width:100%;}
.tool-btn .tb-swatch{width:11px;height:11px;border-radius:2px;flex-shrink:0;
  border:1px solid rgba(255,255,255,.18);}
.tool-btn .tb-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.82rem;
  letter-spacing:.01em;color:var(--ink);line-height:1.05;white-space:nowrap;}
.tool-btn .tb-sub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--ink-dim);
  white-space:nowrap;}
.tool-btn.active{border-color:var(--accent,var(--yellow));background:#26264e;
  box-shadow:0 0 0 1px var(--accent,var(--yellow)) inset;}
.tool-btn.active .tb-name{color:var(--accent,var(--yellow));}
/* Outil démolir : groupe autonome à gauche */
.tool-group.demolish{border-right:1px solid var(--line);}
.tool-btn.demolish-btn{justify-content:center;min-width:84px;align-items:center;}
.tool-btn.demolish-btn .tb-name{color:#ff7a72;}
.tool-btn.demolish-btn.active{border-color:var(--red);background:rgba(255,59,48,.16);
  box-shadow:0 0 0 1px var(--red) inset;}
.tool-btn.upgrade-btn{justify-content:center;min-width:90px;align-items:center;}
.tool-btn.upgrade-btn .tb-name{color:#7fd98a;}
.tool-btn.upgrade-btn.active{border-color:#4CAF50;background:rgba(76,175,80,.16);
  box-shadow:0 0 0 1px #4CAF50 inset;}
.tool-btn.upgrade-btn.active .tb-name{color:#7fd98a;}

/* ── Panneau d'amélioration ── */
.up-panel{width:262px;}
.up-level{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px;
  font-family:'Barlow Condensed',sans-serif;font-size:.86rem;color:var(--ink);}
.up-level b{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:#7fd98a;}
.up-mult{font-family:'DM Mono',monospace;font-size:.72rem;color:#7fd98a;}
.up-rows{display:flex;flex-direction:column;gap:4px;margin-bottom:9px;}
.up-row{display:grid;grid-template-columns:48px 1fr 14px 1fr;align-items:baseline;gap:5px;}
.up-row .lbl{color:var(--ink-dim);text-transform:uppercase;letter-spacing:.04em;font-size:.6rem;}
.up-row .cur{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink-dim);text-align:right;}
.up-row .arr{color:var(--ink-faint);font-size:.68rem;text-align:center;}
.up-row .nxt{font-family:'DM Mono',monospace;font-size:.68rem;color:#7fd98a;text-align:right;}
.up-head-row .cur,.up-head-row .nxt{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.04em;font-size:.58rem;color:var(--ink-faint);}
.up-cost{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:10px;
  padding-top:7px;border-top:1px solid var(--line);}
.up-cost .lbl{color:var(--ink-dim);text-transform:uppercase;letter-spacing:.04em;font-size:.62rem;}
.up-cost .val{font-family:'DM Mono',monospace;font-size:.74rem;color:var(--yellow);text-align:right;}
.up-btn{width:100%;background:rgba(76,175,80,.16);border:1px solid #4CAF50;color:#7fd98a;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.84rem;letter-spacing:.05em;
  text-transform:uppercase;border-radius:5px;padding:8px;cursor:pointer;transition:background .1s;}
.up-btn:hover{background:rgba(76,175,80,.26);}
.up-btn:active{transform:translateY(1px);}
.up-btn:disabled{background:#2a2a3e;border-color:var(--line);color:var(--ink-faint);cursor:not-allowed;}
/* Research-ready notification dot on the Recherche button */
.research-btn{position:relative;}
.research-btn.pending{border-color:var(--yellow);box-shadow:0 0 0 1px var(--yellow) inset;}
.notif-dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;
  background:var(--yellow);border:1px solid var(--panel);animation:notifpulse 1.2s ease-in-out infinite;}
@keyframes notifpulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.35);opacity:.6;}}
/* Tappable quit button in the status bar (mobile-friendly replacement for "Échap") */
.status-quit{margin-left:10px;flex-shrink:0;background:rgba(255,59,48,.16);color:#ff8079;
  border:1px solid rgba(255,59,48,.5);border-radius:5px;padding:3px 12px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;}
.status-quit:hover{background:rgba(255,59,48,.28);}
.status{display:flex;align-items:center;}
/* ── Mobile: show everything (wrap, no horizontal scroll), drop the game title ── */
@media (max-width:760px){
  .hud-brand{display:none;}
  .hud{flex-wrap:wrap;overflow-x:visible;row-gap:6px;}
  .toolbar{flex-wrap:wrap;overflow-x:visible;}
  .build-panel{flex-wrap:wrap;max-height:none;overflow-x:visible;}
  .tool-group.tabs{margin-left:0;}
  .inventory{flex-wrap:wrap;overflow-x:visible;}
  .stocks,.repair-btn,.dev-btn,.research-btn,.save-btn{flex-shrink:0;}
  /* Compress tool/build buttons so a full row fits a phone width */
  .toolbar .tool-group{padding:6px;gap:5px;}
  .build-panel .tool-group{padding:5px 6px;}
  .tool-row{flex-wrap:wrap;gap:4px;}
  .tool-btn{min-width:0;padding:5px 6px;gap:1px;}
  .tool-btn .tb-name{font-size:.76rem;}
  .tool-btn .tb-sub{font-size:.55rem;}
  .tool-btn .tb-top{gap:4px;}
  .tool-btn .tb-swatch{width:9px;height:9px;}
  .tool-btn.demolish-btn{min-width:0;}
  .tool-btn.upgrade-btn{min-width:0;}
  .tab-btn{min-width:0;padding:5px 8px;}
  .tab-btn .tb-name{font-size:.8rem;}
  .tab-btn .tb-sub{font-size:.55rem;}
  .tool-group-label{font-size:.52rem;}
  /* Onglets du bas : restent sur une seule ligne et se partagent la largeur. */
  .tool-group.tabs{padding:6px;width:100%;}
  .tabs-row{flex-wrap:nowrap;gap:3px;}
  .tabs-row .tab-btn{padding:5px 2px;}
  .tabs-row .tab-btn .tb-name{font-size:.72rem;}
  .tabs-row .tab-btn .tb-sub{font-size:.5rem;}
  .tabs-row .tab-btn .tab-ico{font-size:.85rem;}
}
@media (max-width:380px){
  .tabs-row .tab-btn .tb-sub{display:none;}
  .tabs-row .tab-btn .tb-name{font-size:.68rem;}
}
/* ── Very narrow phones: tighter still ── */
@media (max-width:420px){
  .toolbar .tool-group,.build-panel .tool-group{padding:4px 5px;}
  .tool-btn{padding:4px 5px;}
  .tool-btn .tb-name{font-size:.72rem;}
  .tool-btn .tb-sub{font-size:.52rem;}
  .tab-btn{padding:4px 6px;}
  .tab-btn .tb-name{font-size:.74rem;}
}
</style>

<!-- ════════════════════════════════════════════════════════════════
     BOOT — exécuté en JS simple (sans Babel) pour ne pas dépendre du
     temps de compilation. Gère le manifest PWA et le Service Worker.
     ════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  // ── Police désormais EMBARQUÉE en @font-face base64 → aucune dépendance réseau. ──
  var FONTS_CSS  = '';

  // ── Génère une icône PWA (motif île + usine) sans fichier externe ──
  function makeIcon(size){
    var c = document.createElement('canvas'); c.width = c.height = size;
    var x = c.getContext('2d'); var u = size/16; // unité de grille
    x.fillStyle = '#0d0d1a'; x.fillRect(0,0,size,size);
    x.fillStyle = '#3A6A5A'; x.fillRect(2*u,3*u,12*u,10*u);        // côte
    x.fillStyle = '#4A7A3A'; x.fillRect(3*u,4*u,10*u,8*u);         // terre
    x.fillStyle = '#7A6040'; x.fillRect(5*u,5*u,3*u,3*u);          // gisement
    x.fillStyle = '#f0d060';                                       // « usine »
    x.fillRect(9*u,7*u,4*u,5*u); x.fillRect(8*u,9*u,2*u,3*u);
    x.fillStyle = '#FF5722'; x.fillRect(10*u,5*u,1.4*u,2.4*u);     // cheminée
    return c.toDataURL('image/png');
  }

  // ── Manifest minimal injecté via blob URL (supporté par les navigateurs) ──
  try{
    var icon192 = makeIcon(192), icon512 = makeIcon(512);
    var manifest = {
      name:'Archipel Industry', short_name:'Archipel', start_url:'.',
      display:'standalone', orientation:'any',
      background_color:'#0d0d1a', theme_color:'#0d0d1a',
      icons:[
        { src:icon192, sizes:'192x192', type:'image/png' },
        { src:icon512, sizes:'512x512', type:'image/png' }
      ]
    };
    var mBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    var link = document.createElement('link');
    link.rel = 'manifest'; link.href = URL.createObjectURL(mBlob);
    document.head.appendChild(link);
  }catch(e){ /* manifest non critique pour le fonctionnement du jeu */ }

  // ── Service Worker inline (cache shell pour le mode hors ligne) ──
  // IMPORTANT / LIMITATION CONNUE :
  //   Chrome et Firefox REFUSENT d'enregistrer un Service Worker dont le
  //   script provient d'une URL blob: ou data: (le script doit être
  //   same-origin et servi avec un type JS). L'enregistrement ci-dessous
  //   échouera donc silencieusement sur ces navigateurs — c'est attendu.
  //   Pour un offline 100% garanti : héberger le jeu en HTTPS avec un vrai
  //   fichier sw.js (ou inliner React/Babel/polices dans le HTML).
  //   La sauvegarde localStorage reste persistante hors-ligne dans tous les cas.
  var SW_SRC = [
    "var CACHE='archipel-shell-v1';",
    "var PRECACHE=" + JSON.stringify([FONTS_CSS].filter(Boolean)) + ";",
    "self.addEventListener('install',function(e){",
    "  e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(PRECACHE).catch(function(){});}).then(function(){return self.skipWaiting();}));",
    "});",
    "self.addEventListener('activate',function(e){",
    "  e.waitUntil((async function(){var ks=await caches.keys();await Promise.all(ks.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));await self.clients.claim();})());",
    "});",
    "self.addEventListener('fetch',function(e){",
    "  var req=e.request; if(req.method!=='GET') return;",
    "  e.respondWith((async function(){",
    "    var cache=await caches.open(CACHE);",
    "    var cached=await cache.match(req);",
    "    if(cached){ fetch(req).then(function(r){ if(r&&r.ok) cache.put(req,r.clone()); }).catch(function(){}); return cached; }",
    "    try{ var r=await fetch(req); if(r&&(r.ok||r.type==='opaque')) cache.put(req,r.clone()); return r; }",
    "    catch(err){ if(req.mode==='navigate'){ var shell=await cache.match(self.registration.scope); if(shell) return shell; } throw err; }",
    "  })());",
    "});"
  ].join('\n');

  // Garde : pas de SW en file:// (et jamais d'erreur visible)
  if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0){
    try{
      var swBlob = new Blob([SW_SRC], {type:'text/javascript'});
      var swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).then(function(){
        // Réchauffe le cache du HTML une fois le SW actif (pour l'offline au 2e chargement)
        return navigator.serviceWorker.ready;
      }).then(function(){
        try{ fetch(location.href, {cache:'reload'}).catch(function(){}); }catch(_){}
      }).catch(function(){ /* blob SW bloqué : voir la note ci-dessus */ });
    }catch(e){ /* SW indisponible : on continue sans, le jeu reste jouable */ }
  }
})();
</script>
