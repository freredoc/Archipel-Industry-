name: Build Android APK (Mode rapide)

# Construit un APK PARALLÈLE (build de test "mode rapide ×10") autour de
# Archipel_industry_alpha-7-fast.html. applicationId distinct
# (fr.archipel.industry.fast) → s'installe À CÔTÉ de l'app principale, sans
# l'écraser. Publié dans une Release dédiée "apk-fast".
# Ne touche PAS version.json (réservé au jeu principal).
on:
  workflow_dispatch:            # bouton "Run workflow" dans l'onglet Actions
  push:
    branches: [main]
    paths:
      - 'Archipel_industry_alpha-7-fast.html'
      - 'android/**'
      - '.github/workflows/android-fast.yml'

permissions:
  contents: write               # nécessaire pour créer la Release

concurrency:
  group: android-apk-fast
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Bundle FAST game into app assets
        run: |
          mkdir -p android/app/src/main/assets
          cp Archipel_industry_alpha-7-fast.html android/app/src/main/assets/index.html

      - name: Decode signing keystore (if secret is set)
        env:
          KS: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "$KS" | base64 -d > android/app/keystore.jks
            echo "Signing keystore decoded — APK signé avec la clé stable."
          else
            echo "No SIGNING_KEYSTORE_B64 secret — building with the default debug key."
          fi

      - name: Build debug APK (parallèle, mode rapide)
        working-directory: android
        run: |
          chmod +x ./gradlew
          BUILD=$(grep -oP "const GAME_BUILD = \K[0-9]+" ../Archipel_industry_alpha-7-fast.html | head -1)
          VERSION=$(grep -oP "const GAME_VERSION = '\K[^']+" ../Archipel_industry_alpha-7-fast.html | head -1)
          echo "versionCode=$BUILD versionName=$VERSION (FAST)"
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Pvcode="${BUILD:-1}" -Pvname="${VERSION:-1.0} FAST" \
            -PappId="fr.archipel.industry.fast" \
            -PappLabel="Archipel FAST"

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ArchipelIndustryFast.apk

      - name: Show signing certificate
        run: |
          echo "=== Certificat de signature de l'APK (mode rapide) ==="
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs ArchipelIndustryFast.apk | grep -Ei "certificate DN|SHA-256" || true
          else
            echo "(apksigner introuvable)"
          fi
          if [ -f android/app/keystore.jks ]; then
            echo "✅ keystore.jks présent — signature stable."
          else
            echo "::warning::keystore.jks ABSENT — APK signé avec la clé debug (NON stable entre builds)."
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArchipelIndustry-FAST-APK
          path: ArchipelIndustryFast.apk
          if-no-files-found: error

      - name: Publish to "apk-fast" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete apk-fast --yes --cleanup-tag 2>/dev/null || true
          gh release create apk-fast ArchipelIndustryFast.apk \
            --title "APK Android — MODE RAPIDE (build de test)" \
            --notes "Build de **test parallèle** d'Archipel Industry avec un **mode rapide ×10**
          (accélère le temps pour mesurer la durée d'une partie ; aucun impact sur l'équilibre).

          ⚠️ APK distinct (\`fr.archipel.industry.fast\`, libellé **Archipel FAST**) :
          il s'installe **à côté** de l'app principale, il ne la remplace pas.

          Installation :
          1. Téléchargez \`ArchipelIndustryFast.apk\` ci-dessous.
          2. Ouvrez le fichier ; autorisez l'installation depuis cette source si demandé.
          3. Lancez **Archipel FAST**, puis Options → ⏩ Mode rapide.

          Construit automatiquement depuis \`Archipel_industry_alpha-7-fast.html\`."
